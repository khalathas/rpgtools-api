name: Deploy to Dev (Cronos)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Restart app
        run: pm2 restart axiom
      - name: Wait for app to start
        run: sleep 5
      - name: Health check
        run: curl -f http://localhost:4000/api/health
      - name: Run Mabl tests
        run: mabl run --environment-id aKNMuGqhBb9EGkNJgrZexg-e --app-id s23lZsfNpElb60CJpBflVw-a --link-agent-id sd6p2yJL79MIuyEQIPremQ-la --labels rpgtoolsplan
        env:
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}