name: Deploy to Dev (Cronos)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Pull latest code
        run: cd ~/development/rpgtools-api && git pull
      - name: Install dependencies
        run: cd ~/development/rpgtools-api && npm install
      - name: Restart app
        run: pm2 restart axiom
      - name: Wait for app to start
        run: sleep 5
      - name: Health check
        run: curl -f http://localhost:4000/api/health
      - name: Run Mabl tests
        run: mabl deployments create -e aKNMuGqhBb9EGkNJgrZexg-e -a s23lZsfNpElb60CJpBflVw-a -l rpgtoolsplan
        env:
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}